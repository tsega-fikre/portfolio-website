<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Dark Background -->
  <rect width="64" height="64" fill="#0a0a0a" rx="8"/>
  
  <!-- Cyber Green Shield with Lock -->
  <g transform="translate(32, 32)">
    <!-- Shield -->
    <path d="M 0 -20 L 15 -12 L 15 5 Q 15 18 0 24 Q -15 18 -15 5 L -15 -12 Z" 
          fill="none" stroke="#00FF88" stroke-width="2.5" stroke-linejoin="round"/>
    
    <!-- Lock Body -->
    <rect x="-5" y="2" width="10" height="10" fill="#00FF88" rx="1"/>
    
    <!-- Lock Shackle -->
    <path d="M -7 2 L -7 -3 Q -7 -8 0 -8 Q 7 -8 7 -3 L 7 2" 
          fill="none" stroke="#00FF88" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  
  <!-- Initials TF -->
  <text x="32" y="52" font-family="Orbitron, monospace" font-size="10" 
        fill="#00FF88" text-anchor="middle" font-weight="bold" opacity="0.5">TF</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FF88;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00CC66;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="#0a0a0a" stroke="url(#grad)" stroke-width="3"/>
  
  <!-- Shield Shape -->
  <path d="M 50 20 L 70 30 L 70 50 Q 70 70 50 80 Q 30 70 30 50 L 30 30 Z" 
        fill="none" stroke="url(#grad)" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Lock Icon Inside Shield -->
  <rect x="45" y="45" width="10" height="12" fill="url(#grad)" rx="1"/>
  <path d="M 42 45 L 42 40 Q 42 35 50 35 Q 58 35 58 40 L 58 45" 
        fill="none" stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Binary Code Effect -->
  <text x="20" y="15" font-family="monospace" font-size="8" fill="#00FF88" opacity="0.3">01</text>
  <text x="72" y="25" font-family="monospace" font-size="8" fill="#00FF88" opacity="0.3">10</text>
  <text x="15" y="85" font-family="monospace" font-size="8" fill="#00FF88" opacity="0.3">11</text>
  <text x="75" y="90" font-family="monospace" font-size="8" fill="#00FF88" opacity="0.3">01</text>
</svg>
